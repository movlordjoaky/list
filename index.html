<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f0f0f">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Список">
  <title>Список</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Martian+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --accent: #c8f135;
      --accent-dim: rgba(200, 241, 53, 0.12);
      --text: #f0f0f0;
      --text-dim: #666;
      --done-color: #444;
      --radius: 10px;
      --font: 'Martian Mono', monospace;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      overscroll-behavior-x: none;
      -webkit-tap-highlight-color: transparent;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 540px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 12px;
    }

    .header-left {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    h1 {
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.05em;
      color: var(--accent);
    }

    #item-count {
      font-size: 11px;
      color: var(--text-dim);
      font-weight: 300;
    }

    .header-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .icon-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      cursor: pointer;
      padding: 7px 10px;
      border-radius: var(--radius);
      font-size: 13px;
      transition: all 0.15s;
      font-family: var(--font);
      white-space: nowrap;
    }

    .icon-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .icon-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    #sync-btn {
      min-width: 80px;
      font-size: 11px;
    }

    #sync-btn.syncing {
      animation: pulse 1s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.4
      }
    }

    #list-container {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
      position: relative;
    }

    #list-active,
    #list-done {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .divider {
      display: none;
      align-items: center;
      gap: 10px;
      margin: 10px 0;
    }

    .divider.visible {
      display: flex;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider-label {
      font-size: 10px;
      color: var(--text-dim);
      font-weight: 300;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: default;
      transition: background 0.15s, border-color 0.15s, opacity 0.2s;
      user-select: none;
      touch-action: none;
      position: relative;
    }

    .item:hover {
      border-color: #3a3a3a;
    }

    .item.done {
      opacity: 0.45;
    }

    .item.dragging {
      opacity: 0.3;
      border-color: var(--accent);
    }

    .item.drag-over {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .drag-handle {
      color: var(--text-dim);
      cursor: grab;
      font-size: 15px;
      flex-shrink: 0;
      padding: 2px 0;
      line-height: 1;
      touch-action: none;
    }

    .drag-handle:active {
      cursor: grabbing;
    }

    .check {
      width: 20px;
      height: 20px;
      border: 1.5px solid var(--border);
      border-radius: 50%;
      flex-shrink: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .item.done .check {
      background: var(--accent);
      border-color: var(--accent);
    }

    .check::after {
      content: '';
      width: 6px;
      height: 10px;
      border: 2px solid var(--bg);
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translateY(-1px);
      display: none;
    }

    .item.done .check::after {
      display: block;
    }

    .item-text {
      flex: 1;
      font-size: 14px;
      font-weight: 300;
      line-height: 1.4;
      word-break: break-word;
      outline: none;
      background: none;
      border: none;
      color: inherit;
      font-family: var(--font);
      cursor: text;
      min-width: 0;
    }

    .item.done .item-text {
      text-decoration: line-through;
      color: var(--done-color);
    }

    .del-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 16px;
      padding: 2px 4px;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
      flex-shrink: 0;
      line-height: 1;
    }

    .item:hover .del-btn {
      opacity: 1;
    }

    .del-btn:hover {
      color: #ff5f5f;
    }

    #empty {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 0 20px;
      gap: 10px;
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.05em;
      text-align: center;
    }

    #empty .big {
      font-size: 36px;
      margin-bottom: 4px;
    }

    #empty.visible {
      display: flex;
    }

    #new-item-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      margin-top: 4px;
      transition: border-color 0.15s, border-style 0.15s;
      cursor: text;
    }

    #new-item-row:focus-within {
      border-color: var(--accent);
      border-style: solid;
    }

    #new-item-row .plus {
      color: var(--text-dim);
      font-size: 18px;
      flex-shrink: 0;
      line-height: 1;
      pointer-events: none;
      font-weight: 300;
    }

    #new-item {
      flex: 1;
      background: none;
      border: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 300;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      min-width: 0;
      padding: 0;
    }

    #new-item::placeholder {
      color: var(--text-dim);
    }

    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 18px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 300;
      opacity: 0;
      transition: all 0.25s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 100;
      max-width: calc(100vw - 40px);
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    #modal-overlay.show {
      display: flex;
    }

    #modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 24px;
      max-width: 420px;
      width: 100%;
    }

    #modal h2 {
      font-size: 14px;
      font-weight: 500;
      color: var(--accent);
      margin-bottom: 14px;
      letter-spacing: 0.05em;
    }

    #modal p {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.7;
      font-weight: 300;
      margin-bottom: 10px;
    }

    #modal input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
      padding: 10px 12px;
      outline: none;
      margin: 8px 0 16px;
    }

    #modal input:focus,
    #modal textarea:focus {
      border-color: var(--accent);
    }

    .modal-btns {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .modal-btns button {
      font-family: var(--font);
      font-size: 12px;
      padding: 9px 18px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.15s;
    }

    #modal-cancel {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
    }

    #modal-cancel:hover {
      border-color: var(--text-dim);
      color: var(--text);
    }

    #modal-save {
      background: var(--accent);
      border: none;
      color: #0f0f0f;
      font-weight: 500;
    }

    #modal-save:hover {
      opacity: 0.85;
    }

    #clear-done {
      display: none;
      font-size: 11px;
      color: var(--text-dim);
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font);
      padding: 0;
      transition: color 0.15s;
    }

    #clear-done.visible {
      display: inline;
    }

    #clear-done:hover {
      color: #ff5f5f;
    }
  </style>
</head>

<body>
  <div id="app">
    <header>
      <div class="header-left">
        <h1>СПИСОК</h1>
        <span id="item-count"></span>
      </div>
      <div class="header-actions">
        <button id="clear-done" title="Удалить отмеченные">✕ отмеч</button>
        <button id="sync-btn" class="icon-btn" title="Синхронизация с GitHub Gist">⇅ Gist</button>
        <button id="settings-btn" class="icon-btn" title="Настройки">⚙</button>
      </div>
    </header>

    <div id="list-container">
      <div id="list-active"></div>
      <div id="new-item-row" onclick="document.getElementById('new-item').focus()">
        <span class="plus">+</span>
        <input id="new-item" type="text" placeholder="добавить товар..." autocomplete="off" autocorrect="off"
          spellcheck="false">
      </div>
      <div class="divider" id="divider">
        <div class="divider-line"></div>
      </div>
      <div id="list-done"></div>
      <div id="empty">
        <div class="big">📋</div>
        <div>список пуст</div>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <div id="modal-overlay">
    <div id="modal">
      <h2>НАСТРОЙКИ СИНХРОНИЗАЦИИ</h2>
      <p>Вставь три строки:</p>
      <p><small style="color:var(--text-dim)">строка 1 — GitHub Token (github.com/settings/tokens → classic →
          gist)<br>строка 2 — Gist ID (из адресной строки gist.github.com)<br>строка 3 — имя файла (например
          x7k2m9p4.json)</small></p>
      <textarea id="input-config" placeholder="ghp_токен&#10;gist_id&#10;filename.json" rows="3"
        style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--font);font-size:12px;padding:10px 12px;outline:none;margin:8px 0 16px;resize:none;line-height:1.7"></textarea>
      <div class="modal-btns">
        <button id="modal-cancel">Отмена</button>
        <button id="modal-save">Сохранить</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'list_v1';
    const TOKEN_KEY = 'gist_token';
    const GIST_ID_KEY = 'gist_id';
    const FILE_KEY = 'gist_file';

    let items = [];
    let saveTimer = null;
    let isDirty = false;

    function getToken() { return localStorage.getItem(TOKEN_KEY) || ''; }
    function getGistId() { return localStorage.getItem(GIST_ID_KEY) || ''; }
    function getFileName() { return localStorage.getItem(FILE_KEY) || ''; }

    // ─── ORDER ────────────────────────────────────────────────────────────────────
    function maxOrder() {
      return items.length ? Math.max(...items.map(i => i.order ?? 0)) : 0;
    }

    function ensureOrder() {
      items.forEach((item, idx) => {
        if (item.order === undefined) item.order = idx * 10;
      });
    }

    // ─── LOCAL STORAGE ────────────────────────────────────────────────────────────
    function loadLocal() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) items = JSON.parse(raw);
        ensureOrder();
      } catch (e) { items = []; }
    }

    function saveLocal() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    // ─── RENDER ───────────────────────────────────────────────────────────────────
    function render() {
      const active = items.filter(i => !i.done).sort((a, b) => a.order - b.order);
      const done = items.filter(i => i.done).sort((a, b) => a.order - b.order);

      renderSection('list-active', active);
      renderSection('list-done', done);

      document.getElementById('divider').classList.toggle('visible', done.length > 0);
      document.getElementById('empty').classList.toggle('visible', items.length === 0);

      updateCount();
      updateClearBtn();
      initSortable();
    }

    function renderSection(containerId, sectionItems) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      sectionItems.forEach(item => {
        const el = document.createElement('div');
        el.className = 'item' + (item.done ? ' done' : '');
        el.dataset.id = item.id;
        el.innerHTML = `
          <div class="drag-handle">⋮⋮</div>
          <div class="check" data-check></div>
          <div class="item-text" contenteditable="true" spellcheck="false">${escHtml(item.text)}</div>
          <button class="del-btn" title="Удалить">×</button>
        `;
        el.querySelector('[data-check]').addEventListener('click', () => toggleDone(item.id));
        el.querySelector('.del-btn').addEventListener('click', () => deleteItem(item.id));
        const textEl = el.querySelector('.item-text');
        textEl.addEventListener('blur', () => {
          const newText = textEl.textContent.trim();
          if (newText && newText !== item.text) { item.text = newText; scheduleSave(); }
          else if (!newText) deleteItem(item.id);
        });
        textEl.addEventListener('keydown', e => {
          if (e.key === 'Enter') { e.preventDefault(); textEl.blur(); }
        });
        container.appendChild(el);
      });
    }

    function escHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function updateCount() {
      const total = items.length;
      const done = items.filter(i => i.done).length;
      document.getElementById('item-count').textContent = total ? `${done}/${total}` : '';
    }

    function updateClearBtn() {
      document.getElementById('clear-done').classList.toggle('visible', items.some(i => i.done));
    }

    // ─── ACTIONS ──────────────────────────────────────────────────────────────────
    function addItem(text) {
      if (!text.trim()) return;
      items.push({ id: Date.now().toString(), text: text.trim(), done: false, order: maxOrder() + 10 });
      scheduleSave();
      render();
    }

    function toggleDone(id) {
      const item = items.find(i => i.id === id);
      if (item) { item.done = !item.done; scheduleSave(); render(); }
    }

    function deleteItem(id) {
      items = items.filter(i => i.id !== id);
      scheduleSave();
      render();
    }

    function clearDone() {
      items = items.filter(i => !i.done);
      scheduleSave();
      render();
    }

    function scheduleSave() {
      saveLocal();
      isDirty = true;
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => {
        if (isDirty && getToken() && getGistId()) syncToGist();
      }, 2000);
    }

    // ─── SORTABLE ─────────────────────────────────────────────────────────────────
    let sortableActive = null;
    let sortableDone = null;

    function initSortable() {
      if (sortableActive) { sortableActive.destroy(); sortableActive = null; }
      if (sortableDone) { sortableDone.destroy(); sortableDone = null; }
      if (!window.Sortable) return;

      function makeOpts(doneSection) {
        return {
          handle: '.drag-handle',
          animation: 120,
          ghostClass: 'dragging',
          chosenClass: 'drag-over',
          onEnd(evt) {
            const { oldIndex, newIndex } = evt;
            if (oldIndex === newIndex) return;
            const section = items.filter(i => i.done === doneSection).sort((a, b) => a.order - b.order);
            const moved = section[oldIndex];
            if (!moved) return;
            section.splice(oldIndex, 1);
            section.splice(newIndex, 0, moved);
            section.forEach((item, idx) => { item.order = (idx + 1) * 10; });
            scheduleSave();
            render();
          }
        };
      }

      const activeEl = document.getElementById('list-active');
      const doneEl = document.getElementById('list-done');
      if (activeEl.children.length > 0) sortableActive = Sortable.create(activeEl, makeOpts(false));
      if (doneEl.children.length > 0) sortableDone = Sortable.create(doneEl, makeOpts(true));
    }

    // ─── GIST SYNC ────────────────────────────────────────────────────────────────
    function updateSyncBtn(state) {
      const btn = document.getElementById('sync-btn');
      btn.classList.remove('active', 'syncing');
      if (state === 'connected') { btn.textContent = '✓ Gist'; btn.classList.add('active'); btn.title = 'Синхронизировано'; }
      else if (state === 'syncing') { btn.textContent = '⇅ Gist'; btn.classList.add('active', 'syncing'); btn.title = 'Синхронизация...'; }
      else { btn.textContent = '⇅ Sync'; btn.title = 'Настроить синхронизацию'; }
    }

    async function syncToGist() {
      const token = getToken(), gistId = getGistId();
      if (!token || !gistId) return;
      updateSyncBtn('syncing');
      try {
        await fetch(`https://api.github.com/gists/${gistId}`, {
          method: 'PATCH',
          headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ files: { [getFileName()]: { content: JSON.stringify(items) } } })
        });
        isDirty = false;
        updateSyncBtn('connected');
      } catch (e) { toast('Ошибка сохранения'); updateSyncBtn('connected'); }
    }

    async function syncFromGist() {
      const token = getToken(), gistId = getGistId();
      if (!token || !gistId) return;
      updateSyncBtn('syncing');
      try {
        const res = await fetch(`https://api.github.com/gists/${gistId}?t=${Date.now()}`, {
          headers: { Authorization: `Bearer ${token}` }
        });
        if (!res.ok) {
          const err = await res.json();
          toast(`Ошибка ${res.status}: ${err.message}`);
          updateSyncBtn('');
          return;
        }
        const data = await res.json();
        const content = data.files?.[getFileName()]?.content;
        if (content) {
          const remote = JSON.parse(content);
          if (Array.isArray(remote)) { items = remote; ensureOrder(); saveLocal(); render(); }
        }
        updateSyncBtn('connected');
      } catch (e) { toast('Ошибка: ' + e.message); updateSyncBtn(''); }
    }

    async function handleSyncClick() {
      if (!getToken() || !getGistId()) { showModal(); return; }
      updateSyncBtn('syncing');
      await syncToGist();
      await syncFromGist();
    }

    // ─── MODAL ────────────────────────────────────────────────────────────────────
    function showModal() {
      const cfg = [getToken(), getGistId(), getFileName()].filter(Boolean).join('\n');
      document.getElementById('input-config').value = cfg;
      document.getElementById('modal-overlay').classList.add('show');
    }

    document.getElementById('modal-cancel').addEventListener('click', () => {
      document.getElementById('modal-overlay').classList.remove('show');
    });

    document.getElementById('modal-save').addEventListener('click', async () => {
      const lines = document.getElementById('input-config').value.trim().split('\n').map(l => l.trim()).filter(Boolean);
      if (lines.length < 3) { toast('Нужно три строки'); return; }
      localStorage.setItem(TOKEN_KEY, lines[0]);
      localStorage.setItem(GIST_ID_KEY, lines[1]);
      localStorage.setItem(FILE_KEY, lines[2]);
      document.getElementById('modal-overlay').classList.remove('show');
      toast('Настройки сохранены');
      await syncFromGist();
    });

    document.getElementById('modal-overlay').addEventListener('click', e => {
      if (e.target === e.currentTarget) e.currentTarget.classList.remove('show');
    });

    // ─── TOAST ────────────────────────────────────────────────────────────────────
    let toastTimer;
    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
    }

    // ─── INIT ─────────────────────────────────────────────────────────────────────
    loadLocal();
    render();

    if (getToken() && getGistId()) {
      updateSyncBtn('syncing');
      syncFromGist();
    }

    document.getElementById('new-item').addEventListener('keydown', e => {
      if (e.key === 'Enter') { addItem(e.target.value); e.target.value = ''; }
    });

    document.getElementById('sync-btn').addEventListener('click', handleSyncClick);
    document.getElementById('settings-btn').addEventListener('click', showModal);
    document.getElementById('clear-done').addEventListener('click', clearDone);

    setInterval(() => {
      if (getToken() && getGistId()) syncFromGist();
    }, 60000);

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && getToken() && getGistId()) syncFromGist();
    });
    window.addEventListener('online', () => {
      if (getToken() && getGistId()) syncFromGist();
    });

    const sortableScript = document.createElement('script');
    sortableScript.src = 'https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js';
    sortableScript.onload = () => initSortable();
    document.head.appendChild(sortableScript);

    // Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/list/sw.js');
    }
  </script>
</body>

</html>
