<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f0f0f">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Список">
  <title>Список</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Martian+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --green: #c8f135;
      --green-dim: rgba(200, 241, 53, 0.12);
      --blue: #5b9cf6;
      --blue-dim: rgba(91, 156, 246, 0.12);
      --text: #f0f0f0;
      --text-dim: #666;
      --done-color: #444;
      --radius: 10px;
      --font: 'Martian Mono', monospace;
      --list-width: 540px;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── LAYOUT ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    /* Desktop: side by side, always 540px each */
    @media (min-width: 1081px) {
      #app {
        flex-direction: row;
        justify-content: center;
      }

      .list-panel {
        width: var(--list-width);
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        height: 100dvh;
        border-right: 1px solid var(--border);
      }

      .list-panel:last-child {
        border-right: none;
      }

      #swipe-container {
        display: contents;
      }
    }

    /* Mobile: swipe */
    @media (max-width: 1080px) {
      #swipe-container {
        display: flex;
        flex: 1;
        width: 200%;
        transition: transform 0.3s cubic-bezier(.4, 0, .2, 1);
        will-change: transform;
      }

      #swipe-container.show-blue {
        transform: translateX(-50%);
      }

      .list-panel {
        width: 50%;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        height: 100%;
      }
    }

    /* ── HEADER ── */
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 12px;
      min-height: 65px;
    }

    .header-left {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .panel-title {
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.05em;
    }

    .green-panel .panel-title {
      color: var(--green);
    }

    .blue-panel .panel-title {
      color: var(--blue);
    }

    .item-count {
      font-size: 11px;
      color: var(--text-dim);
      font-weight: 300;
    }

    .header-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .icon-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      cursor: pointer;
      padding: 7px 10px;
      border-radius: var(--radius);
      font-size: 13px;
      transition: all 0.15s;
      font-family: var(--font);
      white-space: nowrap;
    }

    .green-panel .icon-btn:hover {
      border-color: var(--green);
      color: var(--green);
    }

    .green-panel .icon-btn.active {
      border-color: var(--green);
      color: var(--green);
      background: var(--green-dim);
    }

    .blue-panel .icon-btn:hover {
      border-color: var(--blue);
      color: var(--blue);
    }

    .blue-panel .icon-btn.active {
      border-color: var(--blue);
      color: var(--blue);
      background: var(--blue-dim);
    }

    .sync-btn {
      min-width: 80px;
      font-size: 11px;
    }

    .sync-btn.syncing {
      animation: pulse 1s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.4
      }
    }

    /* ── LIST ── */
    .list-container {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
      position: relative;
    }

    .list-active,
    .list-done {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .divider {
      display: none;
      align-items: center;
      gap: 10px;
      margin: 10px 0;
    }

    .divider.visible {
      display: flex;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: default;
      transition: background 0.15s, border-color 0.15s, opacity 0.2s;
      user-select: none;
      touch-action: pan-y;
      position: relative;
    }

    .item:hover {
      border-color: #3a3a3a;
    }

    .item.done {
      opacity: 0.45;
    }

    .item.sortable-ghost {
      opacity: 0.3;
    }

    .green-panel .item.sortable-chosen {
      border-color: var(--green);
      background: var(--green-dim);
    }

    .blue-panel .item.sortable-chosen {
      border-color: var(--blue);
      background: var(--blue-dim);
    }

    .drag-handle {
      color: var(--text-dim);
      cursor: grab;
      font-size: 15px;
      flex-shrink: 0;
      padding: 2px 4px;
      line-height: 1;
      touch-action: none;
    }

    .drag-handle:active {
      cursor: grabbing;
    }

    .check {
      width: 20px;
      height: 20px;
      border: 1.5px solid var(--border);
      border-radius: 50%;
      flex-shrink: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .green-panel .item.done .check {
      background: var(--green);
      border-color: var(--green);
    }

    .blue-panel .item.done .check {
      background: var(--blue);
      border-color: var(--blue);
    }

    .check::after {
      content: '';
      width: 6px;
      height: 10px;
      border: 2px solid var(--bg);
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translateY(-1px);
      display: none;
    }

    .item.done .check::after {
      display: block;
    }

    .item-text {
      flex: 1;
      font-size: 14px;
      font-weight: 300;
      line-height: 1.4;
      word-break: break-word;
      outline: none;
      background: none;
      border: none;
      color: inherit;
      font-family: var(--font);
      cursor: text;
      min-width: 0;
    }

    .item.done .item-text {
      text-decoration: line-through;
      color: var(--done-color);
    }

    .del-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 16px;
      padding: 2px 4px;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
      flex-shrink: 0;
      line-height: 1;
    }

    .item:hover .del-btn {
      opacity: 1;
    }

    .del-btn:hover {
      color: #ff5f5f;
    }

    .empty-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 0 20px;
      gap: 10px;
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.05em;
      text-align: center;
    }

    .empty-state .big {
      font-size: 36px;
      margin-bottom: 4px;
    }

    .empty-state.visible {
      display: flex;
    }

    .new-item-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      margin-top: 4px;
      transition: border-color 0.15s, border-style 0.15s;
      cursor: text;
    }

    .green-panel .new-item-row:focus-within {
      border-color: var(--green);
      border-style: solid;
    }

    .blue-panel .new-item-row:focus-within {
      border-color: var(--blue);
      border-style: solid;
    }

    .new-item-row .plus {
      color: var(--text-dim);
      font-size: 18px;
      flex-shrink: 0;
      line-height: 1;
      pointer-events: none;
      font-weight: 300;
    }

    .new-item-input {
      flex: 1;
      background: none;
      border: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 300;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      min-width: 0;
      padding: 0;
    }

    .new-item-input::placeholder {
      color: var(--text-dim);
    }

    .clear-done {
      display: none;
      font-size: 11px;
      color: var(--text-dim);
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font);
      padding: 0;
      transition: color 0.15s;
    }

    .clear-done.visible {
      display: inline;
    }

    .clear-done:hover {
      color: #ff5f5f;
    }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 18px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 300;
      opacity: 0;
      transition: all 0.25s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 100;
      max-width: calc(100vw - 40px);
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── MODAL ── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    #modal-overlay.show {
      display: flex;
    }

    #modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 24px;
      max-width: 420px;
      width: 100%;
    }

    #modal h2 {
      font-size: 14px;
      font-weight: 500;
      color: var(--green);
      margin-bottom: 14px;
      letter-spacing: 0.05em;
    }

    #modal p {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.7;
      font-weight: 300;
      margin-bottom: 10px;
    }

    #modal textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
      padding: 10px 12px;
      outline: none;
      margin: 8px 0 16px;
      resize: none;
      line-height: 1.7;
    }

    #modal textarea:focus {
      border-color: var(--green);
    }

    .modal-btns {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .modal-btns button {
      font-family: var(--font);
      font-size: 12px;
      padding: 9px 18px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.15s;
    }

    #modal-cancel {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
    }

    #modal-cancel:hover {
      border-color: var(--text-dim);
      color: var(--text);
    }

    #modal-save {
      background: var(--green);
      border: none;
      color: #0f0f0f;
      font-weight: 500;
    }

    #modal-save:hover {
      opacity: 0.85;
    }
  </style>
</head>

<body>

  <div id="app">
    <div id="swipe-container">

      <!-- GREEN LIST -->
      <div class="list-panel green-panel" id="panel-green">
        <div class="panel-header">
          <div class="header-left">
            <span class="panel-title">СПИСОК</span>
            <span class="item-count" id="count-green"></span>
          </div>
          <div class="header-actions">
            <button class="clear-done icon-btn" id="clear-green" title="Удалить отмеченные">✕ отмеч</button>
            <button class="sync-btn icon-btn" id="sync-btn" title="Синхронизация">⇅ Gist</button>
            <button class="icon-btn" id="settings-btn" title="Настройки">⚙</button>
          </div>
        </div>
        <div class="list-container" id="container-green">
          <div class="list-active" id="active-green"></div>
          <div class="new-item-row" onclick="document.getElementById('input-green').focus()">
            <span class="plus">+</span>
            <input class="new-item-input" id="input-green" type="text" placeholder="добавить..." autocomplete="off"
              autocorrect="off" spellcheck="false">
          </div>
          <div class="divider" id="divider-green">
            <div class="divider-line"></div>
          </div>
          <div class="list-done" id="done-green"></div>
          <div class="empty-state" id="empty-green">
            <div class="big">📋</div>
            <div>список пуст</div>
          </div>
        </div>
      </div>

      <!-- BLUE LIST -->
      <div class="list-panel blue-panel" id="panel-blue">
        <div class="panel-header">
          <div class="header-left">
            <span class="panel-title">СПИСОК</span>
            <span class="item-count" id="count-blue"></span>
          </div>
          <div class="header-actions">
            <button class="clear-done icon-btn" id="clear-blue" title="Удалить отмеченные">✕ отмеч</button>
            <button class="sync-btn icon-btn" id="sync-btn-blue" title="Синхронизация">⇅ Gist</button>
            <button class="icon-btn" id="settings-btn-blue" title="Настройки">⚙</button>
          </div>
        </div>
        <div class="list-container" id="container-blue">
          <div class="list-active" id="active-blue"></div>
          <div class="new-item-row" onclick="document.getElementById('input-blue').focus()">
            <span class="plus">+</span>
            <input class="new-item-input" id="input-blue" type="text" placeholder="добавить..." autocomplete="off"
              autocorrect="off" spellcheck="false">
          </div>
          <div class="divider" id="divider-blue">
            <div class="divider-line"></div>
          </div>
          <div class="list-done" id="done-blue"></div>
          <div class="empty-state" id="empty-blue">
            <div class="big">📋</div>
            <div>список пуст</div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div id="toast"></div>

  <div id="modal-overlay">
    <div id="modal">
      <h2>НАСТРОЙКИ СИНХРОНИЗАЦИИ</h2>
      <p>Вставь три строки:</p>
      <p><small style="color:var(--text-dim)">строка 1 — GitHub Token<br>строка 2 — Gist ID<br>строка 3 — имя файла
          (например x7k2m9p4.json)</small></p>
      <textarea id="input-config" placeholder="ghp_токен&#10;gist_id&#10;filename.json" rows="3"></textarea>
      <div class="modal-btns">
        <button id="modal-cancel">Отмена</button>
        <button id="modal-save">Сохранить</button>
      </div>
    </div>
  </div>

  <script>
    // ── CONSTANTS ──
    const TOKEN_KEY = 'gist_token';
    const GIST_ID_KEY = 'gist_id';
    const FILE_KEY = 'gist_file';
    const STORAGE_KEY = 'list_v2';

    function getToken() { return localStorage.getItem(TOKEN_KEY) || ''; }
    function getGistId() { return localStorage.getItem(GIST_ID_KEY) || ''; }
    function getFileName() { return localStorage.getItem(FILE_KEY) || ''; }

    // ── STATE ──
    const lists = {
      green: { items: [], listUpdatedAt: 0 },
      blue: { items: [], listUpdatedAt: 0 }
    };

    let saveTimer = null;
    let isDirty = false;
    let isSyncing = false;
    let sortables = {};

    // ── ORDER ──
    function maxOrder(color) {
      const items = lists[color].items;
      return items.length ? Math.max(...items.map(i => i.order ?? 0)) : 0;
    }

    function ensureOrder(color) {
      lists[color].items.forEach((item, idx) => {
        if (item.order === undefined) item.order = idx * 10;
      });
    }

    // ── LOCAL STORAGE ──
    function loadLocal() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          for (const color of ['green', 'blue']) {
            if (parsed[color]) {
              lists[color].items = parsed[color].items || [];
              lists[color].listUpdatedAt = parsed[color].listUpdatedAt || 0;
              ensureOrder(color);
            }
          }
        }
      } catch (e) { }
    }

    function saveLocal() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(lists));
    }

    // ── RENDER ──
    function render(color) {
      const l = lists[color];
      const active = l.items.filter(i => !i.done).sort((a, b) => a.order - b.order);
      const done = l.items.filter(i => i.done).sort((a, b) => a.order - b.order);

      renderSection(`active-${color}`, active, color);
      renderSection(`done-${color}`, done, color);

      document.getElementById(`divider-${color}`).classList.toggle('visible', done.length > 0);
      document.getElementById(`empty-${color}`).classList.toggle('visible', l.items.length === 0);

      const total = l.items.length, doneCount = done.length;
      document.getElementById(`count-${color}`).textContent = total ? `${doneCount}/${total}` : '';
      document.getElementById(`clear-${color}`).classList.toggle('visible', done.length > 0);

      initSortable(color);
    }

    function renderSection(containerId, sectionItems, color) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      sectionItems.forEach(item => {
        const el = document.createElement('div');
        el.className = 'item' + (item.done ? ' done' : '');
        el.dataset.id = item.id;
        el.innerHTML = `
          <div class="drag-handle">⋮⋮</div>
          <div class="check" data-check></div>
          <div class="item-text" contenteditable="true" spellcheck="false">${escHtml(item.text)}</div>
          <button class="del-btn" title="Удалить">×</button>
        `;
        el.querySelector('[data-check]').addEventListener('click', () => toggleDone(color, item.id));
        el.querySelector('.del-btn').addEventListener('click', () => deleteItem(color, item.id));
        const textEl = el.querySelector('.item-text');
        textEl.addEventListener('blur', () => {
          const newText = textEl.textContent.trim();
          if (newText && newText !== item.text) { item.text = newText; scheduleSave(); }
          else if (!newText) deleteItem(color, item.id);
        });
        textEl.addEventListener('keydown', e => {
          if (e.key === 'Enter') { e.preventDefault(); textEl.blur(); }
        });
        container.appendChild(el);
      });
    }

    function escHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function renderAll() { render('green'); render('blue'); }

    // ── ACTIONS ──
    function addItem(color, text) {
      if (!text.trim()) return;
      lists[color].items.push({ id: Date.now().toString(), text: text.trim(), done: false, order: maxOrder(color) + 10 });
      scheduleSave();
      render(color);
    }

    function toggleDone(color, id) {
      const item = lists[color].items.find(i => i.id === id);
      if (item) { item.done = !item.done; scheduleSave(); render(color); }
    }

    function deleteItem(color, id) {
      lists[color].items = lists[color].items.filter(i => i.id !== id);
      scheduleSave();
      render(color);
    }

    function clearDone(color) {
      lists[color].items = lists[color].items.filter(i => !i.done);
      scheduleSave();
      render(color);
    }

    function scheduleSave() {
      const now = Date.now();
      lists.green.listUpdatedAt = now;
      lists.blue.listUpdatedAt = now;
      saveLocal();
      isDirty = true;
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => {
        if (isDirty && getToken() && getGistId()) sync();
      }, 2000);
    }

    // ── SORTABLE ──
    function initSortable(color) {
      ['active', 'done'].forEach(section => {
        const key = `${section}-${color}`;
        if (sortables[key]) { sortables[key].destroy(); delete sortables[key]; }
        const el = document.getElementById(key);
        if (!window.Sortable || el.children.length === 0) return;
        const isDoneSection = section === 'done';
        sortables[key] = Sortable.create(el, {
          handle: '.drag-handle',
          animation: 120,
          ghostClass: 'sortable-ghost',
          chosenClass: 'sortable-chosen',
          forceFallback: true,
          onEnd(evt) {
            const { oldIndex, newIndex } = evt;
            if (oldIndex === newIndex) return;
            const sec = lists[color].items.filter(i => i.done === isDoneSection).sort((a, b) => a.order - b.order);
            const moved = sec[oldIndex];
            if (!moved) return;
            sec.splice(oldIndex, 1);
            sec.splice(newIndex, 0, moved);
            sec.forEach((item, idx) => { item.order = (idx + 1) * 10; });
            scheduleSave();
            render(color);
          }
        });
      });
    }

    // ── SYNC ──
    function updateSyncBtn(state) {
      ['sync-btn', 'sync-btn-blue'].forEach(id => {
        const btn = document.getElementById(id);
        btn.classList.remove('active', 'syncing');
        if (state === 'connected') { btn.textContent = '✓ Gist'; btn.classList.add('active'); }
        else if (state === 'syncing') { btn.textContent = '⇅ Gist'; btn.classList.add('syncing'); }
        else { btn.textContent = '⇅ Sync'; }
      });
    }

    async function sync() {
      if (isSyncing) return;
      const token = getToken(), gistId = getGistId(), fileName = getFileName();
      if (!token || !gistId || !fileName) return;
      isSyncing = true;
      updateSyncBtn('syncing');
      try {
        const res = await fetch(`https://api.github.com/gists/${gistId}?t=${Date.now()}`, {
          headers: { Authorization: `Bearer ${token}` }
        });
        if (!res.ok) {
          const err = await res.json();
          toast(`Ошибка ${res.status}: ${err.message}`);
          updateSyncBtn(''); return;
        }
        const data = await res.json();
        const content = data.files?.[fileName]?.content;
        let shouldUpload = isDirty;

        if (content) {
          let remote;
          try { remote = JSON.parse(content); } catch (e) { toast('Ошибка формата данных'); updateSyncBtn(''); return; }

          let changed = false;
          for (const color of ['green', 'blue']) {
            const rem = remote[color];
            if (!rem) continue;
            const remoteTs = rem.listUpdatedAt ?? 0;
            const localTs = lists[color].listUpdatedAt ?? 0;
            if (remoteTs > localTs) {
              lists[color].items = rem.items || [];
              lists[color].listUpdatedAt = remoteTs;
              ensureOrder(color);
              changed = true;
            }
          }
          if (changed) { saveLocal(); renderAll(); shouldUpload = isDirty; }
        }

        if (shouldUpload) {
          await fetch(`https://api.github.com/gists/${gistId}`, {
            method: 'PATCH',
            headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ files: { [fileName]: { content: JSON.stringify(lists) } } })
          });
          isDirty = false;
        }
        updateSyncBtn('connected');
      } catch (e) {
        toast('Ошибка сети');
        updateSyncBtn('');
      } finally {
        isSyncing = false;
      }
    }

    // ── SWIPE ──
    let swipeStartX = 0, swipeStartY = 0, currentTab = 'green';

    function switchTab(color) {
      currentTab = color;
      document.getElementById('swipe-container').classList.toggle('show-blue', color === 'blue');
    }

    const swipeEl = document.getElementById('swipe-container');

    swipeEl.addEventListener('touchstart', e => {
      swipeStartX = e.touches[0].clientX;
      swipeStartY = e.touches[0].clientY;
    }, { passive: true });

    swipeEl.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - swipeStartX;
      const dy = e.changedTouches[0].clientY - swipeStartY;
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
        if (dx < 0 && currentTab === 'green') switchTab('blue');
        else if (dx > 0 && currentTab === 'blue') switchTab('green');
      }
    }, { passive: true });

    // ── MODAL ──
    function showModal() {
      const cfg = [getToken(), getGistId(), getFileName()].filter(Boolean).join('\n');
      document.getElementById('input-config').value = cfg;
      document.getElementById('modal-overlay').classList.add('show');
    }

    document.getElementById('modal-cancel').addEventListener('click', () => {
      document.getElementById('modal-overlay').classList.remove('show');
    });

    document.getElementById('modal-save').addEventListener('click', async () => {
      const lines = document.getElementById('input-config').value.trim().split('\n').map(l => l.trim()).filter(Boolean);
      if (lines.length < 3) { toast('Нужно три строки'); return; }
      localStorage.setItem(TOKEN_KEY, lines[0]);
      localStorage.setItem(GIST_ID_KEY, lines[1]);
      localStorage.setItem(FILE_KEY, lines[2]);
      document.getElementById('modal-overlay').classList.remove('show');
      toast('Настройки сохранены');
      await sync();
    });

    document.getElementById('modal-overlay').addEventListener('click', e => {
      if (e.target === e.currentTarget) e.currentTarget.classList.remove('show');
    });

    // ── TOAST ──
    let toastTimer;
    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
    }

    // ── INIT ──
    loadLocal();
    renderAll();

    if (getToken() && getGistId()) { updateSyncBtn('syncing'); sync(); }

    document.getElementById('input-green').addEventListener('keydown', e => {
      if (e.key === 'Enter') { addItem('green', e.target.value); e.target.value = ''; }
    });
    document.getElementById('input-blue').addEventListener('keydown', e => {
      if (e.key === 'Enter') { addItem('blue', e.target.value); e.target.value = ''; }
    });

    document.getElementById('sync-btn').addEventListener('click', () => {
      if (!getToken() || !getGistId() || !getFileName()) { showModal(); return; }
      sync();
    });
    document.getElementById('sync-btn-blue').addEventListener('click', () => {
      if (!getToken() || !getGistId() || !getFileName()) { showModal(); return; }
      sync();
    });
    document.getElementById('settings-btn').addEventListener('click', showModal);
    document.getElementById('settings-btn-blue').addEventListener('click', showModal);
    document.getElementById('clear-green').addEventListener('click', () => clearDone('green'));
    document.getElementById('clear-blue').addEventListener('click', () => clearDone('blue'));

    setInterval(() => { if (getToken() && getGistId()) sync(); }, 60000);
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && getToken() && getGistId()) sync();
    });
    window.addEventListener('online', () => { if (getToken() && getGistId()) sync(); });

    const sortableScript = document.createElement('script');
    sortableScript.src = 'https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js';
    sortableScript.onload = () => renderAll();
    document.head.appendChild(sortableScript);

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/list/sw.js');
  </script>
</body>

</html>
